blueprint:
  name: "Casita – Dim display on sunrise/sunset"
  description: >
    Dim the Voice PE Casita display at sunset and restore brightness at sunrise.
  domain: automation
  input:
    brightness_entity:
      name: Matrix Brightness entity
      description: The "Matrix Brightness" entity of your Casita device.
      selector:
        entity:
          domain: number
    dim_entity:
      name: Matrix Dim Brightness entity
      description: The "Matrix Dim Brightness" entity of your Casita device.
      selector:
        entity:
          domain: number
    normal_level:
      name: Normal brightness (%)
      description: Brightness to restore to.
      default: 50
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    sunset_offset:
      name: Sunset offset (minutes)
      description: >
        Offset in minutes from sunset to dim. Negative = before sunset, positive = after.
      default: 0
      selector:
        number:
          min: -120
          max: 120
          unit_of_measurement: min
    sunrise_offset:
      name: Sunrise offset (minutes)
      description: >
        Offset in minutes from sunrise to restore. Negative = before sunrise, positive = after.
      default: 0
      selector:
        number:
          min: -120
          max: 120
          unit_of_measurement: min

variables:
  dim_entity: !input dim_entity

trigger:
  - platform: sun
    event: sunset
    offset: !input sunset_offset
    id: dim
  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: restore

action:
  - choose:
      - conditions: "{{ trigger.id == 'dim' }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input brightness_entity
            data:
              value: "{{ states(dim_entity) | float }}"
      - conditions: "{{ trigger.id == 'restore' }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input brightness_entity
            data:
              value: !input normal_level
