blueprint:
  name: "Casita – Dim display on schedule or sun"
  description: >
    Automatically dim the Voice PE Casita display at night and restore brightness in the morning.
    Choose between a fixed time schedule or sun-based triggering (sunset/sunrise).
  domain: automation
  input:
    device_name:
      name: ESPHome device name
      description: >
        The name of your device as set in home-assistant-voice.yaml (the `name` substitution).
        Example: if your device is `home-assistant-voice`, enter `home_assistant_voice`.
      selector:
        text: {}
    brightness_entity:
      name: Matrix Brightness entity
      description: The "Matrix Brightness" number entity for your Casita device.
      selector:
        entity:
          domain: number
    dim_level:
      name: Dim brightness (%)
      description: Brightness level when dimmed.
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
    normal_level:
      name: Normal brightness (%)
      description: Brightness level when restored.
      default: 50
      selector:
        number:
          min: 5
          max: 100
          step: 5
          unit_of_measurement: "%"
    trigger_mode:
      name: Trigger mode
      description: Use a fixed time schedule or sun events.
      default: sun
      selector:
        select:
          options:
            - label: "Sun (sunset / sunrise)"
              value: sun
            - label: "Fixed time"
              value: time
    dim_time:
      name: Dim time
      description: Time to dim the display (only used when trigger mode is "Fixed time").
      default: "22:00:00"
      selector:
        time: {}
    restore_time:
      name: Restore time
      description: Time to restore brightness (only used when trigger mode is "Fixed time").
      default: "07:00:00"
      selector:
        time: {}
    sunset_offset:
      name: Sunset offset (minutes)
      description: >
        Offset in minutes from sunset to dim. Negative = before sunset, positive = after.
        Only used when trigger mode is "Sun".
      default: 0
      selector:
        number:
          min: -120
          max: 120
          unit_of_measurement: min
    sunrise_offset:
      name: Sunrise offset (minutes)
      description: >
        Offset in minutes from sunrise to restore. Negative = before sunrise, positive = after.
        Only used when trigger mode is "Sun".
      default: 0
      selector:
        number:
          min: -120
          max: 120
          unit_of_measurement: min

variables:
  trigger_mode: !input trigger_mode

trigger:
  - platform: time
    at: !input dim_time
    id: dim_time
  - platform: time
    at: !input restore_time
    id: restore_time
  - platform: sun
    event: sunset
    offset: !input sunset_offset
    id: dim_sun
  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: restore_sun

action:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: dim_time
                  - condition: template
                    value_template: "{{ trigger_mode == 'time' }}"
              - condition: and
                conditions:
                  - condition: trigger
                    id: dim_sun
                  - condition: template
                    value_template: "{{ trigger_mode == 'sun' }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input brightness_entity
            data:
              value: !input dim_level
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: restore_time
                  - condition: template
                    value_template: "{{ trigger_mode == 'time' }}"
              - condition: and
                conditions:
                  - condition: trigger
                    id: restore_sun
                  - condition: template
                    value_template: "{{ trigger_mode == 'sun' }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input brightness_entity
            data:
              value: !input normal_level
