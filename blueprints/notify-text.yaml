blueprint:
  name: "Casita – Scroll text on trigger"
  description: >
    Scroll a custom message on the Voice PE Casita display when any automation trigger fires.
  domain: automation
  input:
    device_name:
      name: ESPHome device name
      description: >
        The name of your device as set in home-assistant-voice.yaml (the `name` substitution).
        Example: if your device is `home-assistant-voice`, enter `home_assistant_voice`.
      selector:
        text: {}
    message:
      name: Message
      description: Text to scroll across the display.
      default: "Hello!"
      selector:
        text: {}
    trigger_entity:
      name: Trigger entity
      description: Entity whose state change triggers the automation.
      selector:
        entity: {}
    trigger_to_state:
      name: Trigger state
      description: The state the entity must change to (e.g. "on", "playing").
      default: "on"
      selector:
        text: {}
    return_after:
      name: Return to face after (seconds)
      description: >
        Seconds before the display returns to the default face.
        Set to 0 to leave the text scrolling until manually changed.
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: s

trigger:
  - platform: state
    entity_id: !input trigger_entity
    to: !input trigger_to_state

action:
  - service: "esphome.{{ device_name }}_display_text"
    data:
      message: !input message
  - if:
      - condition: template
        value_template: "{{ return_after | int > 0 }}"
    then:
      - delay:
          seconds: !input return_after
      - service: "esphome.{{ device_name }}_display_face"
        data:
          name: default
