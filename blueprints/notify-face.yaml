blueprint:
  name: "Casita – Show face on trigger"
  description: >
    Show a named face on the Voice PE Casita display when any automation trigger fires.
    The face shows for a set duration then the display returns to normal.
  domain: automation
  input:
    device_name:
      name: ESPHome device name
      description: >
        The name of your device as set in home-assistant-voice.yaml (the `name` substitution).
        Example: if your device is `home-assistant-voice`, enter `home_assistant_voice`.
      selector:
        text: {}
    face_name:
      name: Face
      description: Which face to show.
      default: happy
      selector:
        select:
          options:
            - default
            - happy
            - grin
            - sad
            - angry
            - surprised
            - neutral
            - listening
            - thinking
            - talking
            - sleeping
    duration:
      name: Duration (seconds)
      description: How long to show the face before returning to normal.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: s
    trigger_entity:
      name: Trigger entity
      description: Entity whose state change triggers the automation.
      selector:
        entity: {}
    trigger_to_state:
      name: Trigger state
      description: The state the entity must change to (e.g. "on", "playing").
      default: "on"
      selector:
        text: {}

trigger:
  - platform: state
    entity_id: !input trigger_entity
    to: !input trigger_to_state

action:
  - service: "esphome.{{ device_name }}_display_face_briefly"
    data:
      name: !input face_name
      duration: !input duration
